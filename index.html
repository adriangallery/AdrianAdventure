<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>ZEROadventure II</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <script>
    // Cache buster: detect stale HTML and force reload
    (function(){var B='__BUILD__',K='zeroadv_v';var p=localStorage.getItem(K);localStorage.setItem(K,B);if(p&&p!==B)location.reload();})();
  </script>
  <!-- Pixel font: Press Start 2P -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #06060c;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    #game-container {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #game-container canvas {
      display: block;
      image-rendering: pixelated;
    }

    /* Loading screen — Thimbleweed Park atmospheric style */
    #loading {
      position: fixed;
      inset: 0;
      background: #06060c;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #504878;
      font-family: 'Press Start 2P', cursive;
      z-index: 100;
      transition: opacity 0.5s;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loading h1 {
      font-size: clamp(0.8rem, 3vw, 1.4rem);
      margin-bottom: 1.5rem;
      color: #f8e848;
      text-shadow: 0 0 20px rgba(248, 232, 72, 0.3);
    }

    #loading p {
      font-size: clamp(0.5rem, 1.5vw, 0.7rem);
    }

    #loading .dots::after {
      content: '';
      animation: dots 1.5s steps(3) infinite;
    }

    @keyframes dots {
      0% { content: '.'; }
      33% { content: '..'; }
      66% { content: '...'; }
    }
  </style>
</head>
<body>
  <div id="loading">
    <h1>ZEROadventure II</h1>
    <p>Loading<span class="dots"></span></p>
  </div>
  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
